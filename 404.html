<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page introuvable | Socialisme ou Barbarie</title>
    <meta name="description" content="La page que vous cherchez n'existe pas." />
    <meta name="robots" content="noindex, follow" />
    <link rel="icon" type="image/jpeg" href="/logo-cjr.jpg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', sans-serif;
        color: #111;
        background-color: #fafafa;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .container {
        text-align: center;
        max-width: 600px;
        padding: 40px 20px;
      }
      h1 {
        font-size: 120px;
        font-weight: 900;
        color: rgba(227, 36, 33, 1);
        line-height: 1;
        margin-bottom: 20px;
      }
      p {
        font-size: 18px;
        color: #555;
        margin-bottom: 30px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        background: #000;
        color: #fff;
        text-transform: uppercase;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        padding: 12px 24px;
        text-decoration: none;
        border: 2px solid #000;
        transition: all 0.2s;
      }
      a:hover {
        background: transparent;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <p>La page que vous cherchez n'existe pas ou a ete deplacee.</p>
      <a href="/">Retour a l'accueil</a>
    </div>
  </body>
</html>
